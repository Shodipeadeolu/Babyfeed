          )}

          {undoLog&&(
            <div className="undo-toast" style={{position:"fixed",bottom:`calc(90px + env(safe-area-inset-bottom))`,left:"50%",transform:"translateX(-50%)",background:"#1a1a2e",borderRadius:16,padding:"14px 20px",display:"flex",alignItems:"center",gap:16,zIndex:300,boxShadow:"0 8px 32px rgba(0,0,0,0.25)",width:"calc(100% - 36px)",maxWidth:400}}>
              <span style={{fontSize:13,color:"#fff",fontWeight:600,flex:1}}>Feed deleted</span>
              <button onClick={handleUndo} style={{background:"#7C5CBF",border:"none",borderRadius:10,padding:"8px 16px",color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>Undo</button>
            </div>
          )}

          {/* TIMER SHEET */}
          {showTimerSheet&&tsb&&(
            <div style={{position:"fixed",inset:0,background:"rgba(20,10,40,0.5)",display:"flex",alignItems:"flex-end",zIndex:100}} onClick={()=>setShowTimerSheet(false)}>
              <div style={{background:T.bg2,borderRadius:"26px 26px 0 0",padding:"28px 22px 46px",width:"100%",maxWidth:430,margin:"0 auto"}} onClick={e=>e.stopPropagation()}>
                <div style={{fontSize:20,fontWeight:900,color:T.text,marginBottom:4}}>⏰ Feeding Timer</div>
                <div style={{fontSize:13,color:T.text2,marginBottom:22}}>for <strong style={{color:tsb.color}}>{tsb.name}</strong></div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:T.bg3,borderRadius:16,padding:"14px 18px",marginBottom:20}}>
                  <span style={{fontSize:15,fontWeight:700,color:T.text}}>Timer {se?"On":"Off"}</span>
                  <div onClick={()=>setSe(x=>!x)} style={{width:50,height:28,borderRadius:14,background:se?tsb.color:T.bg4,cursor:"pointer",position:"relative",transition:"background 0.2s"}}><div style={{position:"absolute",top:3,left:se?24:3,width:22,height:22,borderRadius:"50%",background:"#fff",transition:"left 0.2s",boxShadow:"0 1px 4px rgba(0,0,0,0.2)"}}/></div>
                </div>
                <div style={{opacity:se?1:0.4,pointerEvents:se?"auto":"none"}}>
                  <div style={{fontSize:10,color:T.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>Feed every</div>
                  <div style={{display:"flex",gap:12,marginBottom:16}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,color:T.text2,fontWeight:700,marginBottom:8,textAlign:"center"}}>Hours</div>
                      <div style={{display:"flex",alignItems:"center",background:T.bg3,borderRadius:16,overflow:"hidden"}}>
                        <button onClick={()=>setSh(h=>Math.max(0,h-1))} style={{padding:"12px 16px",background:"none",border:"none",fontSize:22,color:T.text2,cursor:"pointer"}}>−</button>
                        <div style={{flex:1,textAlign:"center",fontSize:28,fontWeight:900,color:tsb.color}}>{sh}</div>
                        <button onClick={()=>setSh(h=>Math.min(23,h+1))} style={{padding:"12px 16px",background:"none",border:"none",fontSize:22,color:tsb.color,cursor:"pointer"}}>+</button>
                      </div>
                    </div>
                    <div style={{display:"flex",alignItems:"center",fontSize:24,fontWeight:900,color:T.text3,paddingTop:28}}>:</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,color:T.text2,fontWeight:700,marginBottom:8,textAlign:"center"}}>Minutes</div>
                      <div style={{display:"flex",alignItems:"center",background:T.bg3,borderRadius:16,overflow:"hidden"}}>
                        <button onClick={()=>setSm(m=>Math.max(0,m-5))} style={{padding:"12px 16px",background:"none",border:"none",fontSize:22,color:T.text2,cursor:"pointer"}}>−</button>
                        <div style={{flex:1,textAlign:"center",fontSize:28,fontWeight:900,color:tsb.color}}>{String(sm).padStart(2,"0")}</div>
                        <button onClick={()=>setSm(m=>Math.min(55,m+5))} style={{padding:"12px 16px",background:"none",border:"none",fontSize:22,color:tsb.color,cursor:"pointer"}}>+</button>
                      </div>
                    </div>
                  </div>
                  <div style={{textAlign:"center",fontSize:13,color:T.text2,marginBottom:14}}>{sh===0&&sm===0?<span style={{color:"#FF4D6D"}}>Set at least 1 minute</span>:<span>Remind every <strong style={{color:tsb.color}}>{sh>0?`${sh}h `:""}{sm>0?`${sm}m`:""}</strong></span>}</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:22,justifyContent:"center"}}>
                    {[{h:0,m:30,l:"30m"},{h:1,m:0,l:"1h"},{h:1,m:30,l:"1h 30m"},{h:2,m:0,l:"2h"},{h:3,m:0,l:"3h"},{h:4,m:0,l:"4h"}].map(p=>{const a=sh===p.h&&sm===p.m;return<button key={p.l} onClick={()=>{setSh(p.h);setSm(p.m);}} style={{padding:"6px 14px",background:a?tsb.color:T.bg3,border:"none",borderRadius:20,color:a?"#fff":T.text2,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{p.l}</button>;})}
                  </div>
                </div>
                <button onClick={doSaveTimer} style={{width:"100%",padding:17,background:`linear-gradient(135deg,${tsb.color},${tsb.color}BB)`,border:"none",borderRadius:16,color:"#fff",fontSize:16,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>Save Timer</button>
              </div>
            </div>
          )}

          {/* DELETE BABY CONFIRM */}
          {confirmDeleteBaby&&(
            <div style={{position:"fixed",inset:0,background:"rgba(20,10,40,0.5)",display:"flex",alignItems:"flex-end",zIndex:100}} onClick={()=>setConfirmDeleteBaby(null)}>
              <div style={{background:T.bg2,borderRadius:"26px 26px 0 0",padding:"28px 22px 46px",width:"100%",maxWidth:430,margin:"0 auto"}} onClick={e=>e.stopPropagation()}>
                <div style={{fontSize:36,marginBottom:12}}>🗑️</div>
                <div style={{fontSize:19,fontWeight:900,color:T.text,marginBottom:8}}>Remove {confirmDeleteBaby.name}?</div>
                <div style={{fontSize:14,color:T.text2,marginBottom:26,lineHeight:1.6}}>All logs for <strong>{confirmDeleteBaby.name}</strong> will be permanently deleted.</div>
                <div style={{display:"flex",gap:12}}>
                  <button onClick={()=>setConfirmDeleteBaby(null)} style={{flex:1,padding:15,background:T.bg3,border:"none",borderRadius:16,color:T.text2,fontSize:15,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>Cancel</button>
                  <button onClick={doDelBaby} style={{flex:1,padding:15,background:"#FF4D6D",border:"none",borderRadius:16,color:"#fff",fontSize:15,cursor:"pointer",fontFamily:"inherit",fontWeight:900}}>Yes, Remove</button>
                </div>
              </div>
            </div>
          )}

          {/* ADD BABY */}
          {addingBaby&&(
            <div style={{position:"fixed",inset:0,background:"rgba(20,10,40,0.5)",display:"flex",alignItems:"flex-end",zIndex:100}} onClick={()=>setAddingBaby(false)}>
              <div style={{background:T.bg2,borderRadius:"26px 26px 0 0",padding:"28px 22px 46px",width:"100%",maxWidth:430,margin:"0 auto"}} onClick={e=>e.stopPropagation()}>
                <div style={{fontSize:20,fontWeight:900,color:T.text,marginBottom:18}}>👶 Add a Baby</div>
                <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doAddBaby()} placeholder="Baby's name" autoFocus style={{width:"100%",padding:"15px",border:`2px solid ${T.bord}`,borderRadius:16,fontSize:16,fontFamily:"inherit",color:T.text,background:T.bg3,boxSizing:"border-box",marginBottom:14}}/>
                <button onClick={doAddBaby} style={{width:"100%",padding:17,background:"linear-gradient(135deg,#FF6B9D,#A78BFA)",border:"none",borderRadius:16,color:"#fff",fontSize:16,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>Add Baby</button>
              </div>
            </div>
          )}

          {/* PARTNER MODAL */}
          {showPartner&&<PartnerModal onClose={()=>setShowPartner(false)} getOrCreateInviteCode={getOrCreateInviteCode} user={user} onLinkPartner={()=>{setShowPartner(false);setShowLinkPartner(true);}}/>}

          {/* LINK TO PARTNER MODAL */}
          {showLinkPartner&&(
            <div style={{position:"fixed",inset:0,background:"rgba(20,10,40,0.6)",display:"flex",alignItems:"flex-end",zIndex:200}} onClick={()=>{setShowLinkPartner(false);setLinkError("");setLinkCode("");}}>
              <div style={{background:T.bg2,borderRadius:"26px 26px 0 0",padding:"32px 24px 48px",width:"100%",maxWidth:430,margin:"0 auto"}} onClick={e=>e.stopPropagation()}>
                <div style={{fontSize:36,marginBottom:12,textAlign:"center"}}>🔗</div>
                <div style={{fontSize:20,fontWeight:900,color:T.text,marginBottom:6,textAlign:"center"}}>Join a Family</div>
                <div style={{fontSize:13,color:T.text2,marginBottom:28,textAlign:"center",lineHeight:1.6}}>Enter the invite code from the family's app.<br/>Your account will be linked to their family.</div>
                {linkSuccess?(
                  <div style={{textAlign:"center",padding:"20px"}}>
                    <div style={{fontSize:48,marginBottom:12}}>✅</div>
                    <div style={{fontSize:16,fontWeight:900,color:"#34D399"}}>Linked successfully!</div>
                    <div style={{fontSize:13,color:T.text2,marginTop:6}}>Reloading app...</div>
                  </div>
                ):(
                  <>
                    <input autoFocus value={linkCode} onChange={e=>setLinkCode(e.target.value.toUpperCase())} placeholder="e.g. AB12CD" maxLength={6}
                      style={{width:"100%",padding:"18px",border:`2.5px solid ${linkError?"#FF4D6D":T.bord}`,borderRadius:16,fontSize:24,fontFamily:"monospace",color:T.text,background:T.bg3,marginBottom:10,textAlign:"center",letterSpacing:6,boxSizing:"border-box"}}/>
                    {linkError&&<div style={{color:"#FF4D6D",fontSize:13,textAlign:"center",marginBottom:12}}>{linkError}</div>}
                    <div style={{background:"#FFF8E7",border:"1px solid #FBBF2444",borderRadius:12,padding:"12px 16px",marginBottom:16,fontSize:12,color:"#92660A",lineHeight:1.6}}>
                      ⚠️ <strong>Note:</strong> This will move your account to your partner's family. Your current babies and logs will no longer be visible.
                    </div>
                    <button onClick={doLinkToFamily} disabled={linkLoading} style={{width:"100%",padding:"16px",background:"linear-gradient(135deg,#A78BFA,#7C5CBF)",border:"none",borderRadius:16,color:"#fff",fontSize:15,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>
                      {linkLoading?"Linking...":"Join Family →"}
                    </button>
                  </>
                )}
              </div>
            </div>
          )}

          {/* SUCKING 15-MIN CHECK */}
          {suckingCheck&&(
            <div style={{position:"fixed",inset:0,background:"rgba(20,10,40,0.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:24}}>
              <div style={{background:T.bg2,borderRadius:24,padding:"28px 24px",width:"100%",maxWidth:380,textAlign:"center"}}>
                <div style={{fontSize:48,marginBottom:12}}>🫦</div>
                <div style={{fontSize:19,fontWeight:900,color:T.text,marginBottom:8}}>Still sucking?</div>
                <div style={{fontSize:13,color:T.text2,marginBottom:24,lineHeight:1.6}}>
                  {babies.find(b=>b.id===suckingCheck.babyId)?.name} has been sucking for 15 minutes.<br/>Is this still ongoing?
                </div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>finishSucking(suckingCheck.babyId)} style={{flex:1,padding:"14px",background:T.bg3,border:"none",borderRadius:14,color:T.text2,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>No, Finish</button>
                  <button onClick={()=>setSuckingCheck(null)} style={{flex:1,padding:"14px",background:"linear-gradient(135deg,#F59E0B,#FBBF24)",border:"none",borderRadius:14,color:"#fff",fontSize:14,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>Yes, Continue</button>
                </div>
              </div>
            </div>
          )}

          {/* ALARM */}
          {alarmFiring&&(
            <div style={{position:"fixed",inset:0,zIndex:999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"rgba(255,30,60,0.97)",animation:"alarmPulse 0.9s ease-in-out infinite"}}>
              <style>{`@keyframes alarmPulse{0%,100%{background:rgba(255,30,60,0.97)}50%{background:rgba(180,0,30,0.99)}}@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}@keyframes bigBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}`}</style>
              <div style={{fontSize:80,animation:"bigBounce 0.9s ease-in-out infinite",marginBottom:10}}>🔔</div>
              <div style={{fontSize:28,fontWeight:900,color:"#fff",textAlign:"center",marginBottom:8,animation:"shake 0.9s ease-in-out infinite"}}>FEEDING TIME!</div>
              <div style={{fontSize:18,color:"rgba(255,255,255,0.9)",fontWeight:700,marginBottom:6}}>{babies.find(b=>b.id===alarmBabyId)?.name||"Baby"} needs to be fed!</div>
              <div style={{fontSize:14,color:"rgba(255,255,255,0.7)",marginBottom:50}}>Every {tlabel(timers[alarmBabyId]||{totalMins:0})} timer is up</div>
              <button onClick={stopAlarm} style={{background:"#fff",border:"none",borderRadius:24,padding:"20px 60px",fontSize:20,fontWeight:900,color:"#FF1E3C",cursor:"pointer",fontFamily:"inherit",boxShadow:"0 8px 32px rgba(0,0,0,0.3)"}}>✓ OKAY, I'M ON IT</button>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ThemeProvider><App/></ThemeProvider>);
    setTimeout(()=>{const s=document.getElementById("splash");if(s){s.classList.add("hide");setTimeout(()=>s.remove(),400);}},500);
    // Smart service worker — auto-detects updates and shows a refresh banner
    if("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").then(reg => {
          // Check for updates every 30 seconds (more aggressive for home screen)
          setInterval(() => reg.update(), 30000);

          reg.addEventListener("updatefound", () => {
            const newWorker = reg.installing;
            newWorker.addEventListener("statechange", () => {
              if(newWorker.state === "installed" && navigator.serviceWorker.controller) {
                // New version available — show banner
                const banner = document.createElement("div");
                banner.id = "update-banner";
                banner.style.cssText = "position:fixed;bottom:100px;left:50%;transform:translateX(-50%);width:calc(100% - 36px);max-width:400px;background:#1a1a2e;border-radius:16px;padding:14px 20px;display:flex;align-items:center;gap:16px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.3);animation:slideUp 0.3s ease";
                banner.innerHTML = `
                  <span style="font-size:20px">🆕</span>
                  <span style="color:#fff;font-size:13px;font-weight:600;flex:1">New update available!</span>
                  <button onclick="navigator.serviceWorker.controller.postMessage('SKIP_WAITING');window.location.reload();"
                    style="background:#7C5CBF;border:none;border-radius:10px;padding:8px 16px;color:#fff;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;flex-shrink:0">
                    Update Now
                  </button>`;
                document.body.appendChild(banner);
              }
            });
          });
        }).catch(() => {});

        // When SW activates (new version took control) — auto reload
        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if(!refreshing){ refreshing = true; window.location.reload(); }
        });

        // Listen for SW_ACTIVATED message — reload immediately on home screen
        navigator.serviceWorker.addEventListener("message", e => {
          if(e.data?.type === "SW_ACTIVATED" && !refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      });
    }
    </script>
</body>
</html>
