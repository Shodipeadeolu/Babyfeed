<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="BabyFeed" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#7C5CBF" />
  <title>BabyFeed 🍼</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%237C5CBF'/%3E%3Ctext y='.9em' font-size='75' x='12'%3E🍼%3C/text%3E%3C/svg%3E" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);overflow-x:hidden}
    body{-webkit-font-smoothing:antialiased;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;transition:background 0.3s,color 0.3s}
    #root{padding-bottom:env(safe-area-inset-bottom)}
    button{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
    ::-webkit-scrollbar{display:none}
    input:focus{outline:none}
    #splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s}
    #splash.hide{opacity:0;pointer-events:none}
    .spin{width:44px;height:44px;border:4px solid var(--border);border-top-color:#7C5CBF;border-radius:50%;animation:spin 0.7s linear infinite;margin-top:18px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn 0.3s ease forwards}
    .pin-dot{width:18px;height:18px;border-radius:50%;border:2.5px solid #C5BCD8;transition:all 0.15s}
    .pin-dot.filled{background:#7C5CBF;border-color:#7C5CBF;transform:scale(1.1)}
    @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
    .undo-toast{animation:slideUp 0.25s ease forwards}

    /* ── THEME VARIABLES ── */
    :root{
      --bg:#F6F3FF; --bg2:#fff; --bg3:#F0EBF8; --bg4:#EDE8F8;
      --text:#1a1a2e; --text2:#888; --text3:#C5BCD8;
      --border:#EDE8F8; --card:#fff; --input:#fff;
      --splash-text:#C5BCD8;
    }
    body.dark{
      --bg:#0F0E17; --bg2:#1C1B2E; --bg3:#252438; --bg4:#2E2C45;
      --text:#F0EEFF; --text2:#AAA; --text3:#5A5880;
      --border:#2E2C45; --card:#1C1B2E; --input:#252438;
      --splash-text:#5A5880;
    }
    body.dark #splash{background:#0F0E17}
    body.dark #splash div:nth-child(2){color:#F0EEFF}
    body.dark #splash div:nth-child(3){color:#5A5880}
  </style>
</head>
<body>
  <div id="splash">
    <div style="font-size:64px">🍼</div>
    <div style="font-size:22px;font-weight:900;color:#1a1a2e;margin-top:12px">BabyFeed</div>
    <div style="font-size:13px;color:#C5BCD8;margin-top:6px">Loading...</div>
    <div class="spin"></div>
  </div>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.0/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <script>
    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyBgousof5ADkp4PaQoDVVqWFiF7r37ISQA",
      authDomain:        "babyfeed-98971.firebaseapp.com",
      projectId:         "babyfeed-98971",
      storageBucket:     "babyfeed-98971.firebasestorage.app",
      messagingSenderId: "461460122252",
      appId:             "1:461460122252:web:9b2315168c7488b3b4a9a9"
    };
    firebase.initializeApp(FIREBASE_CONFIG);
    window._auth = firebase.auth();
    window._db   = firebase.firestore();
    window._db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
  </script>

  <script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback}=React;
    const auth=window._auth, db=window._db;

    const MILK_TYPES=[
      {label:"🤱 Breast Milk", value:"Breast Milk", color:"#FF6B9D"},
      {label:"🥛 Formula",value:"Formula Milk",color:"#6B9DFF"},
      {label:"🔀 Mixed",  value:"Mixed",       color:"#A78BFA"},
      {label:"🫦 Sucking",value:"Sucking",     color:"#F59E0B"},
    ];
    const DIAPER_TYPES=[
      {label:"💧 Wet",  value:"wet",   color:"#60A5FA"},
      {label:"💩 Dirty",value:"dirty", color:"#92400E"},
      {label:"🔀 Mixed",value:"mixed", color:"#A78BFA"},
    ];
    const BABY_COLORS=["#FF6B9D","#6B9DFF","#34D399","#FBBF24","#A78BFA","#F87171"];

    // ── THEME ─────────────────────────────────────────────────
    const ThemeCtx=React.createContext({dark:false,toggle:()=>{}});
    function useTheme(){return React.useContext(ThemeCtx);}
    function ThemeProvider({children}){
      const [dark,setDark]=useState(()=>localStorage.getItem("bf_theme")==="dark");
      useEffect(()=>{
        document.body.classList.toggle("dark",dark);
        localStorage.setItem("bf_theme",dark?"dark":"light");
      },[dark]);
      return <ThemeCtx.Provider value={{dark,toggle:()=>setDark(d=>!d)}}>{children}</ThemeCtx.Provider>;
    }

    // Theme-aware style helpers
    function useT(){
      const {dark}=useTheme();
      return {
        bg:   dark?"#0F0E17":"#F6F3FF",
        bg2:  dark?"#1C1B2E":"#fff",
        bg3:  dark?"#252438":"#F0EBF8",
        bg4:  dark?"#2E2C45":"#EDE8F8",
        text: dark?"#F0EEFF":"#1a1a2e",
        text2:dark?"#AAA":"#888",
        text3:dark?"#5A5880":"#C5BCD8",
        bord: dark?"#2E2C45":"#EDE8F8",
        dark,
      };
    }

    // ── ALARM ─────────────────────────────────────────────────
    function createAlarm(){
      let ctx=null,running=false,iv=null,ph=0;
      function cycle(){
        if(!ctx||!running)return;
        const now=ctx.currentTime,m=ctx.createGain();
        m.gain.setValueAtTime(1.5,now);m.connect(ctx.destination);
        [{t:"sawtooth",a:ph?600:1200,b:ph?1200:600,g:1},{t:"square",a:ph?480:960,b:ph?960:480,g:.5}].forEach(({t,a,b,g})=>{
          const o=ctx.createOscillator(),gn=ctx.createGain();
          o.connect(gn);gn.connect(m);o.type=t;
          o.frequency.setValueAtTime(a,now);o.frequency.linearRampToValueAtTime(b,now+.18);
          gn.gain.setValueAtTime(g,now);gn.gain.linearRampToValueAtTime(0,now+.2);
          o.start(now);o.stop(now+.2);
        });
        const o3=ctx.createOscillator(),g3=ctx.createGain();
        o3.connect(g3);g3.connect(m);o3.type="square";o3.frequency.setValueAtTime(2400,now);
        g3.gain.setValueAtTime(.8,now);g3.gain.exponentialRampToValueAtTime(.001,now+.03);
        o3.start(now);o3.stop(now+.03);ph=ph?0:1;
      }
      return{
        start(){if(running)return;ctx=new(window.AudioContext||window.webkitAudioContext)();running=true;ph=0;cycle();iv=setInterval(cycle,200);},
        stop(){running=false;if(iv)clearInterval(iv);if(ctx){ctx.close();ctx=null;}},
      };
    }
    const alarm=createAlarm();

    // ── UTILS ─────────────────────────────────────────────────
    const fmt=iso=>new Date(iso).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    function timeSince(iso){const m=Math.floor((Date.now()-new Date(iso))/60000);if(m<1)return"just now";if(m<60)return`${m}m ago`;const h=Math.floor(m/60);if(h<24)return`${h}h ${m%60}m ago`;return`${Math.floor(h/24)}d ago`;}
    function fmtDate(iso){const d=new Date(iso);if(d.toDateString()===new Date().toDateString())return"Today";if(d.toDateString()===new Date(Date.now()-86400000).toDateString())return"Yesterday";return d.toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"});}
    function mlToOz(ml){return Math.round(ml/29.5*10)/10;}
    function fmtAmt(ml,unit){return unit==='oz'?`${mlToOz(ml)}oz`:`${ml}ml`;}
    function countdown(ms){if(ms<=0)return"Feed now!";const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;if(h>0)return`${h}h ${m}m`;if(m>0)return`${m}m ${sec}s`;return`${sec}s`;}
    function tlabel(t){if(!t)return"";const h=Math.floor(t.totalMins/60),m=t.totalMins%60;if(h>0&&m>0)return`${h}h ${m}m`;if(h>0)return`${h}h`;return`${m}m`;}
    function genCode(){return Math.random().toString(36).substring(2,8).toUpperCase();}

    // ── PIN PAD ───────────────────────────────────────────────
    function PinPad({value,onChange,color="#7C5CBF"}){const T=useT();
      const keys=["1","2","3","4","5","6","7","8","9","","0","⌫"];
      return(
        <div>
          <div style={{display:"flex",justifyContent:"center",gap:16,marginBottom:28}}>
            {[0,1,2,3].map(i=><div key={i} className={`pin-dot${value.length>i?" filled":""}`} style={value.length>i?{background:color,borderColor:color}:{}}/>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,maxWidth:280,margin:"0 auto"}}>
            {keys.map((k,i)=>(
              <button key={i} onClick={()=>{if(k==="")return;if(k==="⌫")onChange(value.slice(0,-1));else if(value.length<4)onChange(value+k);}}
                style={{padding:"18px",background:k===""?"transparent":k==="⌫"?T.bg3:T.bg2,border:"none",borderRadius:18,fontSize:k==="⌫"?20:22,fontWeight:700,color:k==="⌫"?T.text2:T.text,cursor:k===""?"default":"pointer",fontFamily:"inherit",boxShadow:k===""?"none":"0 2px 10px rgba(0,0,0,0.07)"}}>
                {k}
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ── AUTH SCREEN ───────────────────────────────────────────
    function AuthScreen({onAuth}){
      const [mode,setMode]=useState("welcome");
      const [username,setUsername]=useState("");
      const [pin,setPin]=useState("");
      const [confirmPin,setConfirmPin]=useState("");
      const [error,setError]=useState("");
      const [loading,setLoading]=useState(false);
      const [emailForPin,setEmailForPin]=useState("");
      const [inviteCode,setInviteCode]=useState("");
      const [joinFamilyId,setJoinFamilyId]=useState(null);

      const toEmail=u=>`${u.toLowerCase().replace(/[^a-z0-9]/g,"")}@babyfeed.app`;
      const toPwd=p=>`bf${p}feed`;

      async function googleSignIn(){
        setLoading(true);setError("");
        try{const r=await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());onAuth(r.user);}
        catch(e){setError(e.message);setLoading(false);}
      }
      function goSignUp(){setError("");if(!username.trim()){setError("Enter a username");return;}if(username.length<2){setError("At least 2 characters");return;}setEmailForPin(toEmail(username));setMode("pin-set");setPin("");}
      function goPinConfirm(){setError("");if(pin.length<4){setError("Enter all 4 digits");return;}setMode("pin-confirm");setConfirmPin("");}
      async function doSignUp(){
        if(confirmPin!==pin){setError("PINs don't match");setConfirmPin("");return;}
        setLoading(true);setError("");
        try{const r=await auth.createUserWithEmailAndPassword(emailForPin,toPwd(pin));await r.user.updateProfile({displayName:username.trim()});onAuth(r.user);}
        catch(e){if(e.code==="auth/email-already-in-use")setError("Username taken — try another");else setError(e.message);setMode("welcome");setLoading(false);}
      }
      function goSignIn(){setError("");if(!username.trim()){setError("Enter your username");return;}setEmailForPin(toEmail(username));setMode("pin-check");setPin("");}
      async function doSignIn(){
        setLoading(true);setError("");
        try{const r=await auth.signInWithEmailAndPassword(emailForPin,toPwd(pin));onAuth(r.user);}
        catch(e){setError("Wrong username or PIN");setLoading(false);setPin("");}
      }

      // Join via invite code — partner creates real account then links to family
      async function doJoinFamily(){
        const code=inviteCode.trim().toUpperCase();
        if(code.length<6){setError("Enter the 6-character invite code");return;}
        setLoading(true);setError("");
        try{
          const snap=await db.collection("families").where("code","==",code).limit(1).get();
          if(snap.empty){setError("Code not found. Check and try again.");setLoading(false);return;}
          // Code is valid — store it and move to account creation
          setJoinFamilyId(snap.docs[0].id);
          setMode("join-signup");setLoading(false);setError("");
        }catch(e){setError(e.message);setLoading(false);}
      }

      // Partner creates account then gets linked to the family
      async function doJoinSignUp(){
        if(confirmPin!==pin){setError("PINs don't match");setConfirmPin("");return;}
        if(!username.trim()){setError("Enter a username");return;}
        setLoading(true);setError("");
        try{
          const email=toEmail(username);
          const r=await auth.createUserWithEmailAndPassword(email,toPwd(pin));
          await r.user.updateProfile({displayName:username.trim()});
          await db.collection("users").doc(r.user.uid).set({familyId:joinFamilyId,role:"partner",joinedAt:new Date().toISOString()});
          onAuth(r.user);
        }catch(e){
          if(e.code==="auth/email-already-in-use")setError("Username taken — try another");
          else setError(e.message);
          setLoading(false);
        }
      }

      // Partner joins with Google
      async function doJoinWithGoogle(){
        setLoading(true);setError("");
        try{
          const r=await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
          await db.collection("users").doc(r.user.uid).set({familyId:joinFamilyId,role:"partner",joinedAt:new Date().toISOString()});
          onAuth(r.user);
        }catch(e){setError(e.message);setLoading(false);}
      }

      useEffect(()=>{
        if(mode==="pin-set"&&pin.length===4)setTimeout(goPinConfirm,150);
        if(mode==="pin-confirm"&&confirmPin.length===4)setTimeout(doSignUp,150);
        if(mode==="pin-check"&&pin.length===4)setTimeout(doSignIn,150);
        if(mode==="join-pin-set"&&pin.length===4)setTimeout(()=>{setError("");if(pin.length<4){setError("Enter all 4 digits");return;}setMode("join-pin-confirm");setConfirmPin("");},150);
        if(mode==="join-pin-confirm"&&confirmPin.length===4)setTimeout(doJoinSignUp,150);
      },[pin,confirmPin,mode]);

      const BG="linear-gradient(160deg,#f5f0ff 0%,#fff5f9 100%)";
      const wrap={minHeight:"100vh",background:BG,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 24px",position:"relative"};
      const backBtn=<button onClick={()=>{setMode("welcome");setError("");setPin("");setConfirmPin("");}} style={{position:"absolute",top:28,left:20,background:"none",border:"none",fontSize:24,cursor:"pointer",color:"#C5BCD8",lineHeight:1}}>←</button>;

      if(mode==="welcome")return(
        <div className="fade-in" style={wrap}>
          <div style={{fontSize:72,marginBottom:8}}>🍼</div>
          <div style={{fontSize:28,fontWeight:900,color:"#1a1a2e",marginBottom:6}}>BabyFeed</div>
          <div style={{fontSize:14,color:"#AAA",marginBottom:48,textAlign:"center"}}>{"Track feeds · Stay in sync"}</div>
          <div style={{width:"100%",maxWidth:340,display:"flex",flexDirection:"column",gap:12}}>
            <button onClick={googleSignIn} disabled={loading} style={{width:"100%",padding:"16px",background:"#fff",border:"2px solid #EDE8F8",borderRadius:18,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",color:"#1a1a2e",display:"flex",alignItems:"center",justifyContent:"center",gap:10,boxShadow:"0 4px 16px rgba(0,0,0,0.06)"}}>
              <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.6 0 6.6 5.5 2.6 13.5l7.8 6C12.3 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.5 2.8-2.2 5.2-4.7 6.8l7.3 5.7c4.3-4 6.8-9.9 6.8-16.5z"/><path fill="#FBBC05" d="M10.4 28.5A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.9-4.5l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6.2z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.3-5.7c-2 1.4-4.6 2.2-7.9 2.2-6.3 0-11.7-3.7-13.6-9l-7.8 6C6.6 42.5 14.6 48 24 48z"/></svg>
              Continue with Google
            </button>
            <div style={{display:"flex",alignItems:"center",gap:12}}><div style={{flex:1,height:1,background:"#EDE8F8"}}/><span style={{fontSize:12,color:"#C5BCD8",fontWeight:600}}>OR</span><div style={{flex:1,height:1,background:"#EDE8F8"}}/></div>
            <button onClick={()=>{setMode("signup");setError("");}} style={{width:"100%",padding:"16px",background:"linear-gradient(135deg,#7C5CBF,#FF6B9D)",border:"none",borderRadius:18,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",color:"#fff",boxShadow:"0 6px 20px rgba(124,92,191,0.35)"}}>Create Account</button>
            <button onClick={()=>{setMode("signin");setError("");}} style={{width:"100%",padding:"16px",background:"#fff",border:"2px solid #EDE8F8",borderRadius:18,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",color:"#7C5CBF"}}>Sign In</button>
            <button onClick={()=>{setMode("join");setError("");}} style={{width:"100%",padding:"14px",background:"transparent",border:"2px dashed #D5CCF0",borderRadius:18,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",color:"#A78BFA"}}>🤝 Join a Family</button>
          </div>
          {error&&<div style={{marginTop:20,color:"#FF4D6D",fontSize:13,textAlign:"center"}}>{error}</div>}
        </div>
      );

      if(mode==="join")return(
        <div className="fade-in" style={wrap}>
          {backBtn}
          <div style={{fontSize:48,marginBottom:12}}>🤝</div>
          <div style={{fontSize:22,fontWeight:900,color:"#1a1a2e",marginBottom:6}}>Join a Family</div>
          <div style={{fontSize:13,color:"#AAA",marginBottom:8,textAlign:"center"}}>Step 1 of 3 — Enter invite code</div>
          <div style={{display:"flex",gap:6,marginBottom:28}}>
            {[1,2,3].map(s=><div key={s} style={{height:3,width:60,borderRadius:2,background:s===1?"#7C5CBF":"#EDE8F8"}}/>)}
          </div>
          <div style={{width:"100%",maxWidth:300}}>
            <input autoFocus value={inviteCode} onChange={e=>setInviteCode(e.target.value.toUpperCase())} placeholder="e.g. AB12CD" maxLength={6}
              style={{width:"100%",padding:"18px",border:"2.5px solid #EDE8F8",borderRadius:16,fontSize:24,fontFamily:"monospace",color:"#1a1a2e",background:"#fff",marginBottom:14,textAlign:"center",letterSpacing:6,boxSizing:"border-box"}}/>
            {error&&<div style={{color:"#FF4D6D",fontSize:13,textAlign:"center",marginBottom:12}}>{error}</div>}
            <button onClick={doJoinFamily} disabled={loading} style={{width:"100%",padding:"16px",background:"linear-gradient(135deg,#A78BFA,#7C5CBF)",border:"none",borderRadius:16,color:"#fff",fontSize:15,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>
              {loading?"Checking code...":"Next →"}
            </button>
          </div>
        </div>
      );

      if(mode==="join-signup")return(
        <div className="fade-in" style={wrap}>
          {backBtn}
          <div style={{fontSize:40,marginBottom:12}}>👤</div>
          <div style={{fontSize:22,fontWeight:900,color:"#1a1a2e",marginBottom:6}}>Create Your Account</div>
          <div style={{fontSize:13,color:"#AAA",marginBottom:8,textAlign:"center"}}>Step 2 of 3 — Choose how to sign up</div>
          <div style={{display:"flex",gap:6,marginBottom:28}}>
            {[1,2,3].map(s=><div key={s} style={{height:3,width:60,borderRadius:2,background:s<=2?"#7C5CBF":"#EDE8F8"}}/>)}
          </div>
          <div style={{width:"100%",maxWidth:300,display:"flex",flexDirection:"column",gap:12}}>
            <button onClick={doJoinWithGoogle} disabled={loading} style={{width:"100%",padding:"16px",background:"#fff",border:"2px solid #EDE8F8",borderRadius:18,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit",color:"#1a1a2e",display:"flex",alignItems:"center",justifyContent:"center",gap:10,boxShadow:"0 4px 16px rgba(0,0,0,0.06)"}}>

    // ── FIRESTORE HOOK ────────────────────────────────────────
    function useFirestore(uid){
      const [babies,setBabies]=useState([]);
      const [logs,setLogs]=useState([]);
      const [timers,setTimers]=useState({});
      const [ready,setReady]=useState(false);
      const [familyId,setFamilyId]=useState(null);
      const [activities,setActivities]=useState([]);
      const [meds,setMeds]=useState([]);

      useEffect(()=>{
        if(!uid)return;
        // Migrate old data from users/{uid}/... → families/{uid}/...
        async function migrateIfNeeded(){
          const famBabies=await db.collection(`families/${uid}/babies`).limit(1).get();
          if(!famBabies.empty)return; // already migrated or has new data
          const oldBabies=await db.collection(`users/${uid}/babies`).get();
          if(oldBabies.empty)return; // no old data to migrate
          console.log("Migrating old data...");
          const batch=db.batch();
          oldBabies.docs.forEach(d=>batch.set(db.collection(`families/${uid}/babies`).doc(d.id),d.data()));
          const oldLogs=await db.collection(`users/${uid}/logs`).get();
          oldLogs.docs.forEach(d=>batch.set(db.collection(`families/${uid}/logs`).doc(d.id),d.data()));
          const oldTimers=await db.collection(`users/${uid}/timers`).get();
          oldTimers.docs.forEach(d=>batch.set(db.collection(`families/${uid}/timers`).doc(d.id),d.data()));
          batch.set(db.collection("families").doc(uid),{ownerId:uid,createdAt:new Date().toISOString()},{merge:true});
          batch.set(db.collection("users").doc(uid),{familyId:uid,role:"owner"},{merge:true});
          await batch.commit();
          console.log("Migration complete!");
        }
        migrateIfNeeded().catch(console.error);

        // Check if this user belongs to a family (partner join)
        const uns=[];
        uns.push(db.collection("users").doc(uid).onSnapshot(snap=>{
          const data=snap.data();
          const fid=data?.familyId||uid; // owner uses own uid as familyId
          setFamilyId(fid);
        }));
        return()=>uns.forEach(u=>u());
      },[uid]);

      useEffect(()=>{
        if(!familyId)return;
        const uns=[];
        uns.push(db.collection(`families/${familyId}/babies`).onSnapshot(snap=>{
          setBabies(snap.docs.map(d=>({...d.data(),id:d.id})));
          setReady(true);
        }));
        // Fallback: unblock app after 5s if Firestore is slow or offline
        setTimeout(()=>setReady(r=>r||true),5000);
        uns.push(db.collection(`families/${familyId}/logs`).orderBy("timestamp","desc").limit(500).onSnapshot(snap=>{
          setLogs(snap.docs.map(d=>({...d.data(),id:d.id})));
        }));
        uns.push(db.collection(`families/${familyId}/timers`).onSnapshot(snap=>{
          const t={};snap.docs.forEach(d=>{t[d.id]=d.data();});setTimers(t);
        }));
        uns.push(db.collection(`families/${familyId}/meds`).onSnapshot(snap=>{
          setMeds(snap.docs.map(d=>({...d.data(),id:d.id})));
        }));
        uns.push(db.collection(`families/${familyId}/activities`).orderBy("startTime","desc").limit(200).onSnapshot(snap=>{
          setActivities(snap.docs.map(d=>({...d.data(),id:d.id})));
        },()=>{}));
        return()=>uns.forEach(u=>u());
      },[familyId]);

      const fref=()=>familyId;
      const saveBaby=async b=>db.collection(`families/${fref()}/babies`).doc(String(b.id)).set(b);
      const deleteBaby=async id=>{
        await db.collection(`families/${fref()}/babies`).doc(String(id)).delete();
        const snap=await db.collection(`families/${fref()}/logs`).where("babyId","==",id).get();
        const batch=db.batch();snap.docs.forEach(d=>batch.delete(d.ref));await batch.commit();
      };
      const addLog=async l=>db.collection(`families/${fref()}/logs`).add(l);
      const deleteLog=async id=>db.collection(`families/${fref()}/logs`).doc(id).delete();
      const restoreLog=async l=>{const{id,...data}=l;await db.collection(`families/${fref()}/logs`).doc(id).set(data);};
      const saveTimer=async(bid,data)=>db.collection(`families/${fref()}/timers`).doc(String(bid)).set(data);

      // Generate invite code stored in family doc
      const getOrCreateInviteCode=async()=>{
        const fid=fref();
        const docRef=db.collection("families").doc(fid);
        const snap=await docRef.get();
        if(snap.exists&&snap.data()?.code)return snap.data().code;
        const code=genCode();
        await docRef.set({code,createdAt:new Date().toISOString(),ownerId:uid},{merge:true});
        return code;
      };

      const addActivity=async a=>db.collection(`families/${fref()}/activities`).add(a);
      const deleteActivity=async id=>db.collection(`families/${fref()}/activities`).doc(id).delete();
      const updateActivity=async(id,data)=>db.collection(`families/${fref()}/activities`).doc(id).set(data);

      const addMed=async m=>db.collection(`families/${fref()}/meds`).add(m);
      const deleteMed=async id=>db.collection(`families/${fref()}/meds`).doc(id).delete();
      const updateMed=async(id,data)=>db.collection(`families/${fref()}/meds`).doc(id).update(data);
      return{babies,logs,activities,meds,timers,ready,familyId,saveBaby,deleteBaby,addLog,deleteLog,restoreLog,saveTimer,getOrCreateInviteCode,addActivity,deleteActivity,updateActivity,addMed,deleteMed,updateMed};
    }

    // ── INSIGHTS ENGINE ───────────────────────────────────────
    function computeInsights(babies,logs,dismissedHungry={},dismissedIntake={}){
      const now=Date.now();
      const insights=[];
      const today=new Date().toDateString();
      const yesterday=new Date(now-86400000).toDateString();

      babies.forEach(b=>{
        const bl=logs.filter(l=>l.babyId===b.id);
        const todayLogs=bl.filter(l=>new Date(l.timestamp).toDateString()===today);
        const yestLogs=bl.filter(l=>new Date(l.timestamp).toDateString()===yesterday);
        const week7=bl.filter(l=>new Date(l.timestamp).getTime()>=now-7*86400000);
        const week14=bl.filter(l=>new Date(l.timestamp).getTime()>=now-14*86400000&&new Date(l.timestamp).getTime()<now-7*86400000);

        const todayTotal=todayLogs.reduce((s,l)=>s+l.amount,0);
        const yestTotal=yestLogs.reduce((s,l)=>s+l.amount,0);
        const avg7=week7.length>0?Math.round(week7.reduce((s,l)=>s+l.amount,0)/7):0;
        const avg14prev=week14.length>0?Math.round(week14.reduce((s,l)=>s+l.amount,0)/7):0;

        // Daily summary
        insights.push({
          babyId:b.id,type:"daily",
          title:`${b.name}'s Day`,
          value:`${todayTotal}ml`,
          sub:`${todayLogs.length} feeds today`,
          icon:"📊",color:b.color,
          detail:yestTotal>0?`${todayTotal>yestTotal?"↑":"↓"} vs ${yestTotal}ml yesterday`:null
        });

        // Low intake alert — time-aware (no early AM false alarms)
        if(avg7>0&&todayLogs.length>0){
          const nowHour=new Date(now).getHours();
          const pct=Math.round((todayTotal/avg7)*100);
          const isWatch=nowHour>=8&&nowHour<12&&pct<50;
          const isAlert=nowHour>=12&&nowHour<20&&pct<40;
          const isEveAlert=nowHour>=20&&pct<70;
          if((isAlert||isEveAlert)&&!(dismissedIntake&&dismissedIntake[b.id])){
            insights.push({babyId:b.id,type:"alert",title:"Low Intake Alert",
              value:`${todayTotal}ml`,sub:`${pct}% of usual ${avg7}ml/day`,
              icon:"⚠️",color:"#FF4D6D",detail:`${b.name} is drinking less than usual today`,
              urgent:true,dismissable:true});
          } else if(isWatch&&!(dismissedIntake&&dismissedIntake[b.id])){
            insights.push({babyId:b.id,type:"watch",title:"Worth Monitoring",
              value:`${todayTotal}ml so far`,sub:`${pct}% of usual — still early`,
              icon:"👀",color:"#FBBF24",detail:`${b.name}'s intake is a bit low but it's still early`,
              urgent:false,dismissable:true});
          }
        }

        // Next hunger prediction — based on avg interval
        const sorted=[...bl].sort((a,c)=>new Date(a.timestamp)-new Date(c.timestamp));
        const intervals=[];
        for(let i=1;i<sorted.length;i++)intervals.push((new Date(sorted[i].timestamp)-new Date(sorted[i-1].timestamp))/60000);
        const avgInterval=intervals.length>2?Math.round(intervals.slice(-5).reduce((s,x)=>s+x,0)/Math.min(intervals.length,5)):null;
        const lastFeed=bl.sort((a,c)=>new Date(c.timestamp)-new Date(a.timestamp))[0];
        if(avgInterval&&lastFeed){
          // If dismissed, restart countdown from dismiss time
          const dismissedAt=dismissedHungry&&dismissedHungry[b.id];
          const startMs=dismissedAt&&dismissedAt>new Date(lastFeed.timestamp).getTime()
            ? dismissedAt
            : new Date(lastFeed.timestamp).getTime();
          const nextMs=startMs+avgInterval*60000;
          const diffMs=nextMs-now;
          const label=diffMs<0?"Hungry now!":countdown(diffMs);
          insights.push({
            babyId:b.id,type:"prediction",
            title:"Next Hunger",
            value:label,
            sub:`Based on ${Math.round(avgInterval/60*10)/10}h avg interval`,
            icon:"🔮",color:"#A78BFA",
            detail:diffMs<0?`${b.name} is likely hungry!`:`Predicted at ${fmt(new Date(nextMs).toISOString())}`,
            urgent:diffMs<0
          });
        }

        // Weekly trend
        if(avg7>0&&avg14prev>0){
          const diff=Math.round(((avg7-avg14prev)/avg14prev)*100);
          insights.push({
            babyId:b.id,type:"trend",
            title:"Weekly Trend",
            value:`${diff>0?"+":""}${diff}%`,
            sub:`${avg7}ml/day this week`,
            icon:diff>=0?"📈":"📉",color:diff>=0?"#34D399":"#FBBF24",
            detail:`vs ${avg14prev}ml/day last week`
          });
        }

        // Doctor summary
        const allTime=bl;
        if(allTime.length>0){
          const totalDays=Math.max(1,Math.round((now-new Date(allTime[allTime.length-1]?.timestamp).getTime())/86400000));
          const dailyAvg=Math.round(allTime.reduce((s,l)=>s+l.amount,0)/totalDays);
          const topMilk=MILK_TYPES.map(m=>({...m,count:allTime.filter(l=>l.milkType===m.value).length})).sort((a,b)=>b.count-a.count)[0];
          insights.push({
            babyId:b.id,type:"doctor",
            title:"Doctor Summary",
            value:`${dailyAvg}ml/day`,
            sub:`Over ${totalDays} day${totalDays!==1?"s":""} · ${allTime.length} feeds`,
            icon:"👨‍⚕️",color:"#6B9DFF",
            detail:`Primary: ${topMilk?.label||"N/A"}`
          });
        }
      });

      return insights;
    }

    // ── INSIGHTS VIEW ─────────────────────────────────────────
    function InsightsView({babies,logs,onLogFeed,onDismissHungry,dismissedHungry={},dismissedIntake={}}){
      const T=useT();
      const [expanded,setExpanded]=useState(null);
      const [hungryAction,setHungryAction]=useState(null);
      const insights=computeInsights(babies,logs,dismissedHungry,dismissedIntake);
      // For each baby, compute avg interval (ms) so dismiss expires exactly when next feed is due
      function avgIntervalMs(babyId){
        const bl=[...logs].filter(l=>l.babyId===babyId).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
        const ivs=[];for(let i=1;i<bl.length;i++)ivs.push(new Date(bl[i].timestamp)-new Date(bl[i-1].timestamp));
        if(ivs.length===0)return 2*60*60*1000; // default 2h
        return ivs.slice(-5).reduce((s,x)=>s+x,0)/Math.min(ivs.length,5);
      }
      const urgent=insights.filter(i=>i.urgent && !(
        i.value==="Hungry now!" &&
        dismissedHungry[i.babyId] &&
        (Date.now()-dismissedHungry[i.babyId]) < avgIntervalMs(i.babyId)
      ));
      const byBaby={};babies.forEach(b=>{byBaby[b.id]=insights.filter(i=>i.babyId===b.id);});

      return(
        <div>
          {urgent.length>0&&(
            <div style={{marginBottom:18}}>
              <div style={{fontSize:10,color:"#FF4D6D",fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,marginBottom:10}}>⚠️ Alerts</div>
              {urgent.map((ins,i)=>{
                const isHungry=ins.value==="Hungry now!";
                return(
                  <div key={i} style={{background:T.dark?"#2D1520":"#FFF0F3",border:"2px solid #FF4D6D33",borderRadius:18,padding:"16px",marginBottom:10,cursor:"pointer"}}
                    onClick={()=>setExpanded(expanded===`urgent-${i}`?null:`urgent-${i}`)}>
                    <div style={{display:"flex",alignItems:"center",gap:14}}>
                      <div style={{fontSize:32,flexShrink:0}}>{ins.icon}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:900,color:"#FF4D6D",marginBottom:2}}>{ins.title}</div>
                        <div style={{fontSize:20,fontWeight:900,color:T.text}}>{ins.value}</div>
                        <div style={{fontSize:12,color:T.text2,marginTop:2}}>{ins.detail}</div>
                      </div>
                      <span style={{fontSize:12,color:T.text3}}>{expanded===`urgent-${i}`?"▲":"▼"}</span>
                    </div>
                    {expanded===`urgent-${i}`&&(
                      <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${T.bord}`}}>
                        <div style={{fontSize:12,color:T.text2,marginBottom:12,lineHeight:1.6}}>{ins.sub}</div>
                        {isHungry?(
                          <div style={{display:"flex",gap:8}}>
                            <button onClick={e=>{e.stopPropagation();onLogFeed(ins.babyId);}} style={{flex:1,padding:"10px",background:"linear-gradient(135deg,#FF6B9D,#A78BFA)",border:"none",borderRadius:12,color:"#fff",fontSize:13,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>🍼 Record Feed</button>
                            <button onClick={e=>{e.stopPropagation();onDismissHungry(ins.babyId);}} style={{flex:1,padding:"10px",background:T.bg3,border:"none",borderRadius:12,color:T.text2,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Dismiss</button>
                          </div>
                        ):(
                          <div style={{fontSize:12,color:T.text3,fontStyle:"italic"}}>{ins.type==="alert"||ins.type==="watch"?ins.sub:"Tap a baby tab to log a feed"}</div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {babies.map(b=>(
            <div key={b.id} style={{marginBottom:24}}>
              <div style={{fontSize:13,fontWeight:900,color:b.color,marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:b.color}}/>
                {b.name}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                {(byBaby[b.id]||[]).filter(i=>!i.urgent).map((ins,i)=>{
                  const key=`${b.id}-${i}`;
                  return(
                    <div key={i} onClick={()=>setExpanded(expanded===key?null:key)}
                      style={{background:T.bg2,borderRadius:18,padding:"16px",borderLeft:`4px solid ${ins.color}`,cursor:"pointer",transition:"transform 0.15s",transform:expanded===key?"scale(0.97)":"scale(1)"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                        <span style={{fontSize:20}}>{ins.icon}</span>
                        <span style={{fontSize:10,color:T.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:.8}}>{ins.title}</span>
                      </div>

    // ── DASHBOARD ─────────────────────────────────────────────
    function DashboardView({babies,logs}){
      const T=useT();
      const [range,setRange]=useState(7);
      const now=Date.now(),recent=logs.filter(l=>new Date(l.timestamp).getTime()>=now-range*86400000);
      const gm=range<=14?"day":range<=90?"week":"month";
      function gk(ts){const d=new Date(ts);if(gm==="day")return d.toDateString();if(gm==="week"){const w=new Date(d);w.setDate(d.getDate()-d.getDay());return w.toDateString();}return`${d.getFullYear()}-${d.getMonth()}`;}
      function gl(k){if(gm==="day")return new Date(k).toLocaleDateString([],{weekday:"short"});if(gm==="week")return new Date(k).toLocaleDateString([],{month:"short",day:"numeric"});const[y,m]=k.split("-");return new Date(+y,+m).toLocaleDateString([],{month:"short",year:"2-digit"});}
      const gmap={};
      recent.forEach(l=>{const k=gk(l.timestamp);if(!gmap[k]){gmap[k]={k,label:gl(k),ts:new Date(l.timestamp).getTime()};babies.forEach(b=>gmap[k][b.id]=0);}gmap[k][l.babyId]=(gmap[k][l.babyId]||0)+l.amount;});
      if(gm==="day"){for(let i=0;i<range;i++){const d=new Date(now-(range-1-i)*86400000),k=d.toDateString();if(!gmap[k]){gmap[k]={k,label:d.toLocaleDateString([],{weekday:"short"}),ts:d.getTime()};babies.forEach(b=>gmap[k][b.id]=0);}}}
      const cd=Object.values(gmap).sort((a,b)=>a.ts-b.ts);cd.forEach(d=>{d.total=babies.reduce((s,b)=>s+(d[b.id]||0),0);});
      const mb=Math.max(...cd.map(d=>d.total),1);
      function stats(bid){const bl=recent.filter(l=>l.babyId===bid),t=bl.reduce((s,l)=>s+l.amount,0),avg=bl.length>0?Math.round(t/range):0,apf=bl.length>0?Math.round(t/bl.length):0,s=[...bl].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)),iv=[];for(let i=1;i<s.length;i++)iv.push((new Date(s[i].timestamp)-new Date(s[i-1].timestamp))/60000);const ai=iv.length>0?Math.round(iv.reduce((x,y)=>x+y,0)/iv.length):0;return{total:t,avg,apf,feeds:bl.length,ai};}
      function mkbd(bid){const bl=recent.filter(l=>l.babyId===bid),t=bl.reduce((s,l)=>s+l.amount,0);return MILK_TYPES.map(m=>{const a=bl.filter(l=>l.milkType===m.value).reduce((s,l)=>s+l.amount,0);return{...m,a,p:t>0?Math.round(a/t*100):0};}).filter(m=>m.a>0);}
      const hm=Array(24).fill(0);recent.forEach(l=>{hm[new Date(l.timestamp).getHours()]++;});const mh=Math.max(...hm,1);
      const rl=range>=365?"1 year":range>=90?`${range/30|0} months`:range>=30?"1 month":`${range} days`;
      const C=({ch,s={}})=><div style={{background:T.bg2,borderRadius:20,padding:"18px",marginBottom:14,...s}}>{ch}</div>;
      const SectionTitle=({t})=><div style={{fontSize:10,color:T.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,marginBottom:14}}>{t}</div>;
      return(
        <div>
          <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
            {[{l:"3d",v:3},{l:"7d",v:7},{l:"14d",v:14},{l:"1M",v:30},{l:"3M",v:90},{l:"1Y",v:365}].map(o=><button key={o.l} onClick={()=>setRange(o.v)} style={{flex:1,minWidth:"calc(33% - 6px)",padding:"9px 4px",background:range===o.v?"#7C5CBF":T.bg2,border:"none",borderRadius:12,color:range===o.v?"#fff":T.text2,fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>{o.l}</button>)}
          </div>
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            {babies.map(b=>{const s=stats(b.id);return(<div key={b.id} style={{flex:1,background:T.bg2,borderRadius:18,padding:"14px",borderTop:`4px solid ${b.color}`}}><div style={{fontSize:13,fontWeight:900,color:b.color,marginBottom:8}}>{b.name}</div><div style={{fontSize:22,fontWeight:900,color:T.text}}>{s.avg}<span style={{fontSize:11,color:T.text3,fontWeight:500}}>ml/day</span></div><div style={{fontSize:11,color:T.text3,marginTop:4}}>{s.feeds}{" feeds · ~"}{s.apf}{"ml each"}</div>{s.ai>0&&<div style={{fontSize:11,color:T.text3,marginTop:2}}>avg every {s.ai>=60?`${Math.floor(s.ai/60)}h ${s.ai%60}m`:`${s.ai}m`}</div>}</div>);})}
          </div>
          <C ch={<><SectionTitle t={`${gm==="day"?"Daily":gm==="week"?"Weekly":"Monthly"} Intake — ${rl}`}/><div style={{display:"flex",alignItems:"flex-end",gap:gm==="month"?6:3,height:120,overflowX:"auto",paddingBottom:2}}>{cd.map((d,i)=><div key={i} style={{flexShrink:0,minWidth:gm==="day"?0:36,flex:gm==="day"?1:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}><div style={{fontSize:8,color:T.text3,fontWeight:600,marginBottom:2}}>{d.total>0?d.total:""}</div><div style={{width:"100%",display:"flex",flexDirection:"column",justifyContent:"flex-end",height:90,gap:1}}>{babies.map(b=>{const h=d[b.id]>0?Math.max(4,Math.round(d[b.id]/mb*90)):0;return h>0?<div key={b.id} style={{width:"100%",height:h,background:b.color,borderRadius:4,opacity:.85}}/>:null;})}</div><div style={{fontSize:8,color:T.text3,fontWeight:700,marginTop:4,textAlign:"center",whiteSpace:"nowrap"}}>{d.label}</div></div>)}</div><div style={{display:"flex",gap:12,marginTop:12,justifyContent:"center"}}>{babies.map(b=><div key={b.id} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:10,height:10,borderRadius:3,background:b.color}}/><span style={{fontSize:11,color:T.text2,fontWeight:600}}>{b.name}</span></div>)}</div></>}/>
          <C ch={<><SectionTitle t="Milk Type Breakdown"/>{babies.map(b=>{const bd=mkbd(b.id);return bd.length===0?<div key={b.id} style={{fontSize:12,color:T.text3,marginBottom:12}}>{b.name}: no data</div>:(<div key={b.id} style={{marginBottom:16}}><div style={{fontSize:12,fontWeight:800,color:b.color,marginBottom:8}}>{b.name}</div>{bd.map(m=><div key={m.value} style={{marginBottom:6}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:11,color:T.text2,fontWeight:600}}>{m.label}</span><span style={{fontSize:11,color:m.color,fontWeight:800}}>{m.p}{"% · "}{m.a}{"ml"}</span></div><div style={{background:T.bg3,borderRadius:6,height:8,overflow:"hidden"}}><div style={{height:"100%",width:`${m.p}%`,background:m.color,borderRadius:6,transition:"width 0.4s"}}/></div></div>)}</div>);})}</>}/>
          {babies.length>1&&<C ch={<><SectionTitle t="Baby Comparison"/>{(()=>{const st=babies.map(b=>({...b,...stats(b.id)}));return(<div style={{display:"flex",flexDirection:"column",gap:12}}>{[{k:"total",l:"Total intake",s:"ml",mx:Math.max(...st.map(x=>x.total),1)},{k:"feeds",l:"Total feeds",s:"",mx:Math.max(...st.map(x=>x.feeds),1)},{k:"apf",l:"Avg per feed",s:"ml",mx:Math.max(...st.map(x=>x.apf),1)}].map(m=><div key={m.k}><div style={{fontSize:11,color:T.text2,fontWeight:700,marginBottom:6}}>{m.l}</div>{st.map(s=><div key={s.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}><div style={{width:36,fontSize:11,fontWeight:800,color:s.color,flexShrink:0}}>{s.name.split(" ")[0]}</div><div style={{flex:1,background:T.bg3,borderRadius:6,height:10,overflow:"hidden"}}><div style={{height:"100%",width:`${s[m.k]/m.mx*100}%`,background:s.color,borderRadius:6}}/></div><div style={{fontSize:11,fontWeight:800,color:T.text2,width:50,textAlign:"right"}}>{s[m.k]}{m.s}</div></div>)}</div>)}</div>);})()}</>}/>}
          <C ch={<><SectionTitle t={`Feeding Heatmap — ${rl}`}/><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{hm.map((c,h)=>{const iv=c/mh,bg=iv===0?T.bg3:`rgba(124,92,191,${0.15+iv*0.85})`;const label=h===0?"12AM":h<12?`${h}AM`:h===12?"12PM":`${h-12}PM`;return<div key={h} title={label} style={{width:"calc(12.5% - 4px)",aspectRatio:"1",borderRadius:8,background:bg,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:7,color:iv>.5?"#fff":T.text3,fontWeight:700,textAlign:"center",lineHeight:1.1}}>{label}</span></div>;})}</div><div style={{display:"flex",gap:4,marginTop:10,alignItems:"center",justifyContent:"center"}}><span style={{fontSize:10,color:T.text3}}>Less</span>{[.1,.3,.55,.75,1].map(v=><div key={v} style={{width:14,height:14,borderRadius:4,background:`rgba(124,92,191,${0.15+v*0.85})`}}/>)}<span style={{fontSize:10,color:T.text3}}>More</span></div></>}/>
        </div>
      );
    }

    // ── ACTIVITY VIEW ─────────────────────────────────────────
    function ActivityView({babies,activities,activeBabyId,suckingActive,sleepActive,onStartSucking,onFinishSucking,onStartSleep,onFinishSleep,onLogSleep,onLogDiaper,onDeleteActivity,onUpdateActivity,fmtDur,nowMs,activityFilter,setActivityFilter}){
      const T=useT();
      const [editAct,setEditAct]=useState(null);
      const [editStart,setEditStart]=useState("");
      const [editEnd,setEditEnd]=useState("");
      const [editDiaper,setEditDiaper]=useState("");
      const [confirmDelAct,setConfirmDelAct]=useState(null);
      const [diaperFlash,setDiaperFlash]=useState({});
      const [manualSleep,setManualSleep]=useState({}); // {babyId: {startVal, endVal}}

      const filtered=activityFilter==="all"?activities:activities.filter(a=>a.babyId===activityFilter);

      function fmtDurSecs(secs){
        if(!secs&&secs!==0)return"—";
        const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;
        const ss=String(s).padStart(2,"0");
        if(h>0)return`${h}h ${m}m ${ss}s`;
        if(m>0)return`${m}m ${ss}s`;
        return`${s}s`;
      }

      function actIcon(a){return a.type==="sleep"?"😴":a.type==="sucking"?"🫦":a.diaperType==="wet"?"💧":a.diaperType==="dirty"?"💩":"🔀";}
      function actLabel(a){
        if(a.type==="sleep")return`Sleep · ${fmtDurSecs(a.durationSecs)}`;
        if(a.type==="sucking")return`Sucking · ${fmtDurSecs(a.durationSecs)}`;
        const dt=DIAPER_TYPES.find(d=>d.value===a.diaperType);
        return`Diaper · ${dt?.label.split(" ")[1]||a.diaperType}`;
      }
      function actColor(a){
        if(a.type==="sleep")return"#60A5FA";
        if(a.type==="sucking")return"#F59E0B";
        return DIAPER_TYPES.find(d=>d.value===a.diaperType)?.color||"#A78BFA";
      }

      async function saveEditAct(){
        if(!editAct)return;
        const start=new Date(editStart).toISOString();
        const end=editEnd?new Date(editEnd).toISOString():editAct.endTime;
        const durationSecs=editEnd&&editStart?Math.round((new Date(editEnd)-new Date(editStart))/1000):editAct.durationSecs;
        const updated={...editAct};
        if(editStart)updated.startTime=start;
        if(editEnd)updated.endTime=end;
        if(durationSecs)updated.durationSecs=durationSecs;
        if(editAct.type==="diaper"&&editDiaper)updated.diaperType=editDiaper;
        const{id,...data}=updated;
        await onUpdateActivity(id,data);
        setEditAct(null);
      }

      // Separate active sessions per baby
      const ab=babies.find(b=>b.id===activeBabyId)||babies[0];

      return(
        <div>
          {/* Active sessions banner */}
          {Object.keys(suckingActive).map(bid=>{
            const b=babies.find(x=>x.id===bid);
            return(
              <div key={bid} style={{background:T.dark?"#2D2010":"#FFF8E7",border:"2px solid #F59E0B44",borderRadius:18,padding:"14px 18px",marginBottom:12,display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:28}}>🫦</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:"#92660A",fontWeight:700,textTransform:"uppercase",letterSpacing:.8}}>{b?.name}{" · Sucking"}</div>
                  <div style={{fontSize:22,fontWeight:900,color:"#F59E0B"}}>{fmtDur(Math.round((nowMs-suckingActive[bid].startMs)/1000))}</div>
                </div>
                <button onClick={()=>onFinishSucking(bid)} style={{padding:"10px 18px",background:"#F59E0B",border:"none",borderRadius:14,color:"#fff",fontSize:13,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>Finish</button>
              </div>
            );
          })}
          {Object.keys(sleepActive).map(bid=>{
            const b=babies.find(x=>x.id===bid);
            return(
              <div key={bid} style={{background:T.dark?"#101A2D":"#EFF6FF",border:"2px solid #60A5FA44",borderRadius:18,padding:"14px 18px",marginBottom:12,display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:28}}>😴</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:"#1D4ED8",fontWeight:700,textTransform:"uppercase",letterSpacing:.8}}>{b?.name}{" · Sleeping"}</div>
                  <div style={{fontSize:22,fontWeight:900,color:"#60A5FA"}}>{fmtDur(Math.round((nowMs-sleepActive[bid].startMs)/1000))}</div>
                </div>
                <button onClick={()=>onFinishSleep(bid)} style={{padding:"10px 18px",background:"#60A5FA",border:"none",borderRadius:14,color:"#fff",fontSize:13,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>Finish</button>
              </div>
            );
          })}

          {/* Quick log buttons per baby */}
          {babies.map(b=>(
            <div key={b.id} style={{background:T.bg2,borderRadius:20,padding:"16px",marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:900,color:b.color,marginBottom:12,display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:b.color}}/>{b.name}
              </div>
              {/* Sleep */}
              <div style={{marginBottom:10}}>
                <div style={{fontSize:10,color:T.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>😴 Sleep</div>
                {sleepActive[b.id]?(
                  <button onClick={()=>onFinishSleep(b.id)} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#60A5FA,#3B82F6)",border:"none",borderRadius:14,color:"#fff",fontSize:14,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>
                    {"✓ Finish Sleep · "}{fmtDur(Math.round((nowMs-sleepActive[b.id].startMs)/1000))}
                  </button>
                ):(
                  <div>
                    {!manualSleep[b.id]?(
                      <div style={{display:"flex",gap:8}}>
                        <button onClick={()=>onStartSleep(b.id)} style={{flex:1,padding:"13px",background:T.bg3,border:`2px dashed ${T.bord}`,borderRadius:14,color:T.text2,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>

                        </button>
                        <button onClick={()=>setManualSleep(s=>({...s,[b.id]:{startVal:new Date(Date.now()-30*60000).toISOString().slice(0,16),endVal:new Date().toISOString().slice(0,16)}}))}
                          style={{padding:"13px 14px",background:T.bg3,border:`2px dashed ${T.bord}`,borderRadius:14,color:T.text3,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>
                          ✏️ Log past
                        </button>
                      </div>

                      <div style={{background:T.bg3,borderRadius:14,padding:"14px"}}>
                        <div style={{fontSize:11,color:T.text3,fontWeight:700,marginBottom:8,textTransform:"uppercase",letterSpacing:.8}}>Log Past Sleep</div>
                        <div style={{fontSize:11,color:T.text3,marginBottom:4,fontWeight:600}}>Fell asleep</div>
                        <input type="datetime-local" value={manualSleep[b.id]?.startVal||""} onChange={e=>setManualSleep(s=>({...s,[b.id]:{...s[b.id],startVal:e.target.value}}))}
                          style={{width:"100%",padding:"9px 12px",border:`2px solid ${T.bord}`,borderRadius:10,fontSize:13,fontFamily:"inherit",color:T.text,background:T.bg2,boxSizing:"border-box",marginBottom:8}}/>
                        <div style={{fontSize:11,color:T.text3,marginBottom:4,fontWeight:600}}>Woke up</div>
                        <input type="datetime-local" value={manualSleep[b.id]?.endVal||""} onChange={e=>setManualSleep(s=>({...s,[b.id]:{...s[b.id],endVal:e.target.value}}))}
                          style={{width:"100%",padding:"9px 12px",border:`2px solid ${T.bord}`,borderRadius:10,fontSize:13,fontFamily:"inherit",color:T.text,background:T.bg2,boxSizing:"border-box",marginBottom:10}}/>
                        <div style={{display:"flex",gap:8}}>
                          <button onClick={()=>setManualSleep(s=>{const n={...s};delete n[b.id];return n;})}
                            style={{flex:1,padding:"10px",background:T.bg2,border:"none",borderRadius:10,color:T.text2,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
                          <button onClick={async()=>{
                            const ms=manualSleep[b.id];
                            if(!ms?.startVal||!ms?.endVal)return;
                            const startMs=new Date(ms.startVal).getTime();
                            const endMs=new Date(ms.endVal).getTime();
                            if(endMs<=startMs)return;
                            const durationSecs=Math.round((endMs-startMs)/1000);
                            await onLogSleep(b.id,new Date(ms.startVal).toISOString(),new Date(ms.endVal).toISOString(),durationSecs);
                            setManualSleep(s=>{const n={...s};delete n[b.id];return n;});
                          }} style={{flex:2,padding:"10px",background:"linear-gradient(135deg,#60A5FA,#3B82F6)",border:"none",borderRadius:10,color:"#fff",fontSize:13,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>
                            💾 Save Sleep
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
              {/* Diapers */}
              <div>
                <div style={{fontSize:10,color:T.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>🩲 Diaper</div>
                <div style={{display:"flex",gap:8}}>
                  {DIAPER_TYPES.map(dt=>(
                    <button key={dt.value} onClick={()=>{onLogDiaper(b.id,dt.value);setDiaperFlash(f=>({...f,[b.id]:dt.value}));setTimeout(()=>setDiaperFlash(f=>{const n={...f};delete n[b.id];return n;}),2000);}}
                      style={{flex:1,padding:"11px 4px",background:diaperFlash[b.id]===dt.value?dt.color:T.bg3,border:"2px solid "+(diaperFlash[b.id]===dt.value?dt.color:T.bord),borderRadius:14,color:diaperFlash[b.id]===dt.value?"#fff":T.text2,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s"}}>
                      {diaperFlash[b.id]===dt.value?"✓ Logged!":dt.label}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          ))}

              {babies.map(b=><button key={b.id} onClick={()=>setActivityFilter(b.id)} style={{padding:"7px 16px",background:activityFilter===b.id?b.color:T.bg3,border:"none",borderRadius:20,color:activityFilter===b.id?"#fff":T.text2,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{b.name}</button>)}

          {filtered.length>0&&(()=>{

                {groupItems.map(a=>{
            const b=babies.find(x=>x.id===a.babyId);

            return(
              <div key={a.id} style={{background:T.bg2,borderRadius:18,marginBottom:8,overflow:"hidden"}}>
                {!isEditing&&(
                  <div onClick={()=>{setEditAct(a);setEditStart(a.startTime?new Date(a.startTime).toISOString().slice(0,16):"");setEditEnd(a.endTime?new Date(a.endTime).toISOString().slice(0,16):"");setEditDiaper(a.diaperType||"");}} style={{padding:"14px 16px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}>
                    <div style={{width:44,height:44,borderRadius:14,background:ac+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:20}}>{actIcon(a)}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:900,color:T.text,fontSize:15}}>{actLabel(a)}</div>
                      <div style={{fontSize:12,color:T.text3,marginTop:2}}>
                        {b?.name}{" · "}{fmt(a.startTime)}
                        {a.loggedBy&&<span style={{marginLeft:6,background:T.dark?"#2D1F45":"#F0EBF8",color:"#A78BFA",fontWeight:700,padding:"1px 7px",borderRadius:6,fontSize:11}}>👤 {a.loggedBy}</span>}
                      </div>
                    </div>
                    <span style={{fontSize:11,color:T.text3}}>✏️</span>
                  </div>
                )}
                {isEditing&&(
                  <div style={{padding:"16px"}}>
                    <div style={{fontSize:12,color:T.text3,fontWeight:700,marginBottom:12,textTransform:"uppercase",letterSpacing:.8}}>✏️ Edit {a.type==="diaper"?"Diaper":(a.type==="sleep"?"Sleep":"Sucking")}</div>
                    <div style={{fontSize:11,color:T.text3,marginBottom:4,fontWeight:600}}>Start Time</div>
                    <input type="datetime-local" value={editStart} onChange={e=>setEditStart(e.target.value)}
                      style={{width:"100%",padding:"10px 14px",border:`2px solid ${T.bord}`,borderRadius:12,fontSize:14,fontFamily:"inherit",color:T.text,background:T.bg3,boxSizing:"border-box",marginBottom:10}}/>
                    {a.type!=="diaper"&&<>
                      <div style={{fontSize:11,color:T.text3,marginBottom:4,fontWeight:600}}>End Time</div>
                      <input type="datetime-local" value={editEnd} onChange={e=>setEditEnd(e.target.value)}
                        style={{width:"100%",padding:"10px 14px",border:`2px solid ${T.bord}`,borderRadius:12,fontSize:14,fontFamily:"inherit",color:T.text,background:T.bg3,boxSizing:"border-box",marginBottom:10}}/>
                    </>}
                    {a.type==="diaper"&&(
                      <div style={{display:"flex",gap:6,marginBottom:12}}>
                        {DIAPER_TYPES.map(dt=><button key={dt.value} onClick={()=>setEditDiaper(dt.value)} style={{flex:1,padding:"8px 4px",background:editDiaper===dt.value?dt.color:T.bg3,border:"none",borderRadius:12,color:editDiaper===dt.value?"#fff":T.text2,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{dt.label}</button>)}
                      </div>
                    )}
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>setEditAct(null)} style={{flex:1,padding:"10px",background:T.bg3,border:"none",borderRadius:12,color:T.text2,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
                      <button onClick={()=>setConfirmDelAct(a)} style={{padding:"10px 14px",background:"#FFF0F3",border:"none",borderRadius:12,color:"#FF4D6D",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>🗑</button>
                      <button onClick={saveEditAct} style={{flex:1,padding:"10px",background:"linear-gradient(135deg,#34D399,#10B981)",border:"none",borderRadius:12,color:"#fff",fontSize:13,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>Save</button>
                    </div>
                  </div>
                )}
              </div>
            );
                })}
              </div>
            ));
          })()}

          {/* Confirm delete activity */}
          {confirmDelAct&&(
            <div style={{position:"fixed",inset:0,background:"rgba(20,10,40,0.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:24}}>
              <div style={{background:T.bg2,borderRadius:24,padding:"28px 24px",width:"100%",maxWidth:380}}>
                <div style={{fontSize:32,marginBottom:12,textAlign:"center"}}>🗑️</div>
                <div style={{fontSize:17,fontWeight:900,color:T.text,marginBottom:8,textAlign:"center"}}>Delete this activity?</div>

                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setConfirmDelAct(null)} style={{flex:1,padding:"13px",background:T.bg3,border:"none",borderRadius:14,color:T.text2,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
                  <button onClick={async()=>{await onDeleteActivity(confirmDelAct.id);setConfirmDelAct(null);setEditAct(null);}} style={{flex:1,padding:"13px",background:"#FF4D6D",border:"none",borderRadius:14,color:"#fff",fontSize:14,fontWeight:900,cursor:"pointer",fontFamily:"inherit"}}>Delete</button>

    // ── MEDS VIEW ─────────────────────────────────────────────
    function MedsView({babies,meds,onAddMed,onDeleteMed,onConfirmDose,onTogglePause,nowMs}){
      const T=useT();
      const [subView,setSubView]=useState("schedule");
      const [showAdd,setShowAdd]=useState(false);
      const [medName,setMedName]=useState("");
      const [medBabyId,setMedBabyId]=useState(babies[0]?.id||"");
      const [medFreq,setMedFreq]=useState(1);
      const [medTimes,setMedTimes]=useState(["08:00"]);
      const [medDurationType,setMedDurationType]=useState("fixed");
      const [medDays,setMedDays]=useState(7);
      const [medNote,setMedNote]=useState("");
      const [saving,setSaving]=useState(false);

      function fmt12(t){
        if(!t)return"";
        const [h,m]=t.split(":").map(Number);
        const ap=h>=12?"PM":"AM";
        const h12=h===0?12:h>12?h-12:h;
        return`${h12}:${String(m).padStart(2,"0")} ${ap}`;
      }
      function updateFreq(n){
        setMedFreq(n);
        if(n===1)setMedTimes(["08:00"]);
        else if(n===2)setMedTimes(["08:00","20:00"]);
        else if(n===3)setMedTimes(["08:00","14:00","20:00"]);
        else setMedTimes(["07:00","11:00","15:00","21:00"]);
      }
      async function saveMed(){
        if(!medName.trim())return;
        setSaving(true);
        const endDate=medDurationType==="fixed"?new Date(Date.now()+medDays*86400000).toISOString():null;
        await onAddMed({name:medName.trim(),babyId:medBabyId,freq:medFreq,times:medTimes,
          durationType:medDurationType,days:medDurationType==="fixed"?medDays:null,
          startDate:new Date().toISOString(),endDate,note:medNote.trim(),paused:false,
          createdAt:new Date().toISOString()});
        setMedName("");setMedNote("");setMedFreq(1);setMedTimes(["08:00"]);
        setMedDurationType("fixed");setMedDays(7);setSaving(false);setShowAdd(false);
      }
      const now=new Date(nowMs);
      const todayStr=now.toDateString();
      function getNextDose(med){
        if(med.paused)return null;
        if(med.endDate&&new Date(med.endDate)<now)return null;
        const todayDoses=med.times.map(t=>{const[h,m]=t.split(":").map(Number);const d=new Date(now);d.setHours(h,m,0,0);return d;});
        const future=todayDoses.filter(d=>d>now);
        if(future.length>0)return future[0];
        return todayDoses.map(d=>{const n=new Date(d);n.setDate(n.getDate()+1);return n;})[0];
      }
      function minsUntil(d){return d?Math.round((d-now)/60000):null;}
      function fmtCd(mins){if(mins===null)return"";if(mins<=0)return"NOW";if(mins<60)return`${mins}m`;const h=Math.floor(mins/60),m=mins%60;return m>0?`${h}h ${m}m`:`${h}h`;}
      function progressPct(med){if(!med.endDate)return null;const total=new Date(med.endDate)-new Date(med.startDate);return Math.min(100,Math.max(0,Math.round((now-new Date(med.startDate))/total*100)));}
      const [localTaken,setLocalTaken]=useState({}); // {medId: {key: bool}}

      function isDoseTaken(med,t){
        const key=todayStr+"|"+t;
        const local=localTaken[med.id];
        if(local&&key in local)return local[key];
        return med.takenDoses&&!!med.takenDoses[key];
      }

      async function toggleDose(med,t){
        const key=todayStr+"|"+t;
        const currentlyTaken=isDoseTaken(med,t);
        // Instant local flip
        setLocalTaken(lt=>({...lt,[med.id]:{...(lt[med.id]||{}),[key]:!currentlyTaken}}));
        // Persist to Firestore
        const updated={...(med.takenDoses||{})};
        if(currentlyTaken){delete updated[key];}else{updated[key]=new Date().toISOString();}
        await onConfirmDose(med,updated);
      }
      const activeMeds=meds.filter(m=>!m.endDate||new Date(m.endDate)>now);
      const completedMeds=meds.filter(m=>m.endDate&&new Date(m.endDate)<=now);
      const dueSoon=activeMeds.filter(m=>{const mins=minsUntil(getNextDose(m));return mins!==null&&mins<=30&&mins>=0;});

      return(
        <div>
          <div style={{display:"flex",gap:8,marginBottom:18}}>
            {[["schedule","💊 Schedule"],["dashboard","📊 Dashboard"]].map(([v,l])=>(
              <button key={v} onClick={()=>setSubView(v)} style={{flex:1,padding:"10px",background:subView===v?"#7C5CBF":T.bg2,border:"none",borderRadius:14,color:subView===v?"#fff":T.text2,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
            ))}
          </div>
          {dueSoon.length>0&&subView==="schedule"&&(
            <div style={{background:"linear-gradient(135deg,#FF6B9D22,#7C5CBF22)",border:"2px solid #FF6B9D44",borderRadius:16,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>{"🔔"}</span>
              <div>
                <div style={{fontSize:12,fontWeight:800,color:"#FF6B9D",textTransform:"uppercase",letterSpacing:.8}}>{"Due Soon"}</div>
                <div style={{fontSize:13,color:T.text,fontWeight:600}}>{dueSoon.map(m=>{const b=babies.find(x=>x.id===m.babyId);return`${m.name} (${b?.name||"?"}) — ${fmtCd(minsUntil(getNextDose(m)))}`}).join(" • ")}</div>
              </div>
            </div>
          )}
          {subView==="schedule"&&(
            <div>
              {activeMeds.length===0&&!showAdd&&(
                <div style={{textAlign:"center",padding:"50px 0",color:T.text3}}>
                  <div style={{fontSize:40,marginBottom:12}}>{"💊"}</div>
                  <div style={{fontSize:15,fontWeight:700,marginBottom:6}}>{"No medications yet"}</div>
                  <div style={{fontSize:13}}>{"Tap + Add Medication to get started"}</div>
                </div>
              )}
              {activeMeds.map(med=>{
                const b=babies.find(x=>x.id===med.babyId);
                const next=getNextDose(med);const mins=minsUntil(next);
                const overdue=mins!==null&&mins<0;const soon=mins!==null&&mins<=30&&mins>=0;
                const pct=progressPct(med);
                const daysLeft=med.endDate?Math.ceil((new Date(med.endDate)-now)/86400000):null;
                return(
                  <div key={med.id} style={{background:T.bg2,borderRadius:20,padding:"16px 18px",marginBottom:12,border:`2px solid ${overdue?"#FF4D6D44":soon?"#F59E0B44":T.bord}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                          <span style={{fontSize:16}}>{"💊"}</span>
                          <span style={{fontSize:16,fontWeight:900,color:T.text}}>{med.name}</span>
                          {med.paused&&<span style={{fontSize:10,background:"#F59E0B22",color:"#F59E0B",fontWeight:700,padding:"2px 8px",borderRadius:8}}>{"PAUSED"}</span>}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:20,height:20,borderRadius:"50%",background:(b?.color||"#999")+"22",display:"flex",alignItems:"center",justifyContent:"center"}}>
                            <span style={{fontSize:10,fontWeight:900,color:b?.color}}>{b?.name?.[0]||"?"}</span>
                          </div>
                          <span style={{fontSize:12,color:T.text2,fontWeight:600}}>{b?.name||"Unknown"}</span>
                          <span style={{fontSize:11,color:T.text3}}>{"•"}</span>
                          <span style={{fontSize:12,color:T.text3}}>{med.freq}{"x daily"}</span>
                          {med.durationType==="ongoing"&&<span style={{fontSize:11,background:"#7C5CBF22",color:"#7C5CBF",fontWeight:700,padding:"2px 7px",borderRadius:8}}>{"Ongoing"}</span>}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>onTogglePause(med)} style={{padding:"6px 10px",background:med.paused?"#34D39922":"#F59E0B22",border:"none",borderRadius:10,color:med.paused?"#34D399":"#F59E0B",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{med.paused?"▶":"⏸"}</button>
                        <button onClick={()=>onDeleteMed(med.id)} style={{padding:"6px 10px",background:"#FF4D6D11",border:"none",borderRadius:10,color:"#FF4D6D",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"✕"}</button>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                      {med.times.map(t=>{
                        const taken=isDoseTaken(med,t);
                        const[h,m2]=t.split(":").map(Number);
                        const dt=new Date(now);dt.setHours(h,m2,0,0);
                        const isPast=dt<=now;
                        return(
                          <button key={t} onClick={()=>toggleDose(med,t)}
                            style={{padding:"7px 14px",
                              background:taken?"#34D399":"#FF4D6D22",
                              border:`2px solid ${taken?"#34D399":"#FF4D6D"}`,
                              borderRadius:12,
                              color:taken?"#fff":"#FF4D6D",
                              fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}}>
                            {taken?"✓ ":"✕ "}{fmt12(t)}
                          </button>
                        );
                      })}
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:pct!==null?8:0}}>
                      <div style={{fontSize:12,color:overdue?"#FF4D6D":soon?"#F59E0B":T.text3,fontWeight:600}}>
                        {med.paused?"Paused":!next?"Course complete":("Next: "+fmt12((next.toTimeString().slice(0,5)))+" ("+fmtCd(mins)+")")}
                      </div>
                      {daysLeft!==null&&<span style={{fontSize:11,color:T.text3,fontWeight:600}}>{daysLeft>0?daysLeft+" day"+(daysLeft!==1?"s":"")+" left":"Last day"}</span>}
                    </div>
                    {pct!==null&&(<div style={{background:T.bg3,borderRadius:6,height:5,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:pct>80?"#34D399":"#7C5CBF",borderRadius:6,transition:"width 0.4s"}}/></div>)}
                    {med.note&&<div style={{fontSize:11,color:T.text3,marginTop:8,fontStyle:"italic"}}>{med.note}</div>}
                  </div>
                );
              })}
              {showAdd?(
                <div style={{background:T.bg2,borderRadius:20,padding:"18px",border:`2px solid #7C5CBF44`,marginBottom:12}}>
                  <div style={{fontSize:14,fontWeight:800,color:T.text,marginBottom:14}}>{"+ New Medication"}</div>
                  <div style={{fontSize:11,color:T.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>{"Medication Name"}</div>
                  <input value={medName} onChange={e=>setMedName(e.target.value)} placeholder="e.g. Amoxicillin"
                    style={{width:"100%",padding:"11px 14px",border:`2px solid ${T.bord}`,borderRadius:12,fontSize:14,fontFamily:"inherit",color:T.text,background:T.bg3,boxSizing:"border-box",marginBottom:12}}/>
                  <div style={{fontSize:11,color:T.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>{"Baby"}</div>
                  <div style={{display:"flex",gap:8,marginBottom:12}}>
                    {babies.map(b=>(
                      <button key={b.id} onClick={()=>setMedBabyId(b.id)} style={{flex:1,padding:"10px",background:medBabyId===b.id?b.color:T.bg3,border:`2px solid ${medBabyId===b.id?b.color:T.bord}`,borderRadius:12,color:medBabyId===b.id?"#fff":T.text2,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{b.name}</button>
                    ))}
                  </div>
                  <div style={{fontSize:11,color:T.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>{"Frequency"}</div>
                  <div style={{display:"flex",gap:8,marginBottom:12}}>
                    {[1,2,3,4].map(n=>(
                      <button key={n} onClick={()=>updateFreq(n)} style={{flex:1,padding:"10px",background:medFreq===n?"#7C5CBF":T.bg3,border:`2px solid ${medFreq===n?"#7C5CBF":T.bord}`,borderRadius:12,color:medFreq===n?"#fff":T.text2,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{n}{"x"}</button>
                    ))}
                  </div>
                  <div style={{fontSize:11,color:T.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>{"Times"}</div>
                  <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                    {medTimes.map((t,i)=>(
                      <input key={i} type="time" value={t} onChange={e=>{const a=[...medTimes];a[i]=e.target.value;setMedTimes(a);}}
                        style={{padding:"9px 12px",border:`2px solid ${T.bord}`,borderRadius:10,fontSize:13,fontFamily:"inherit",color:T.text,background:T.bg3}}/>
                    ))}
                  </div>
                  <div style={{fontSize:11,color:T.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>{"Duration"}</div>
                  <div style={{display:"flex",gap:8,marginBottom:12}}>
                    {[["fixed","Fixed Course"],["ongoing","Ongoing"]].map(([v,l])=>(
                      <button key={v} onClick={()=>setMedDurationType(v)} style={{flex:1,padding:"10px",background:medDurationType===v?"#7C5CBF":T.bg3,border:`2px solid ${medDurationType===v?"#7C5CBF":T.bord}`,borderRadius:12,color:medDurationType===v?"#fff":T.text2,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
                    ))}
                  </div>
                  {medDurationType==="fixed"&&(
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                      <span style={{fontSize:13,color:T.text2,fontWeight:600}}>{"Days:"}</span>
                      <button onClick={()=>setMedDays(d=>Math.max(1,d-1))} style={{width:36,height:36,borderRadius:10,background:T.bg3,border:"none",fontSize:18,color:T.text2,cursor:"pointer"}}>{"−"}</button>
                      <span style={{fontSize:18,fontWeight:900,color:T.text,minWidth:30,textAlign:"center"}}>{medDays}</span>
                      <button onClick={()=>setMedDays(d=>d+1)} style={{width:36,height:36,borderRadius:10,background:T.bg3,border:"none",fontSize:18,color:T.text2,cursor:"pointer"}}>{"+"}</button>
                      <span style={{fontSize:13,color:T.text3}}>{medDays===1?"day":"days"}</span>
                    </div>
                  )}
                  <div style={{fontSize:11,color:T.text3,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>{"Notes (optional)"}</div>
                  <input value={medNote} onChange={e=>setMedNote(e.target.value)} placeholder="e.g. with food"
                    style={{width:"100%",padding:"11px 14px",border:`2px solid ${T.bord}`,borderRadius:12,fontSize:13,fontFamily:"inherit",color:T.text,background:T.bg3,boxSizing:"border-box",marginBottom:14}}/>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>setShowAdd(false)} style={{flex:1,padding:"12px",background:T.bg3,border:"none",borderRadius:14,color:T.text2,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{"Cancel"}</button>
                    <button onClick={saveMed} disabled={saving||!medName.trim()} style={{flex:2,padding:"12px",background:saving||!medName.trim()?"#ccc":"linear-gradient(135deg,#7C5CBF,#FF6B9D)",border:"none",borderRadius:14,color:"#fff",fontSize:14,fontWeight:900,cursor:saving||!medName.trim()?"default":"pointer",fontFamily:"inherit"}}>{saving?"Saving...":"Save Medication"}</button>
                  </div>
                </div>
              ):(
                <button onClick={()=>setShowAdd(true)} style={{width:"100%",padding:"14px",background:T.bg2,border:`2px dashed ${T.bord}`,borderRadius:18,color:"#7C5CBF",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>{"+ Add Medication"}</button>
              )}
            </div>
          )}
          {subView==="dashboard"&&(
            <div>
              <div style={{fontSize:13,fontWeight:800,color:T.text3,textTransform:"uppercase",letterSpacing:.8,marginBottom:10}}>{"Active"}</div>
              {activeMeds.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:T.text3,fontSize:13}}>{"No active medications"}</div>}

        if(!secs&&secs!==0)return"—";
        const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;
